<!DOCTYPE html>
<html lang="en">
<head> 
<!--
  Sources:
  Built on three.js:
    library: https://threejs.org
    docs: https://threejs.org/docs
    examples: https://threejs.org/examples

  Sand dissolve effect samples the canvas's pixels and scatters the
  opaque ones as points:
    Louis Hoebregts (Mamboleoo), "How to convert an image into particles"
    https://www.mamboleoo.be/articles/how-to-convert-an-image-into-particles
    Codrops, "Interactive Particles with Three.js"
    https://tympanus.net/codrops/2019/01/17/interactive-particles-with-three-js/
    Codrops, "Implementing a Dissolve Effect with Shaders and Particles in Three.js"
    https://tympanus.net/codrops/2025/02/17/implementing-a-dissolve-effect-with-shaders-and-particles-in-three-js/

  Text painted on a canvas and used as a texture, typesetting — Canvas API:
    https://developer.mozilla.org/en-US/docs/Web/API/Canvas_API
    https://developer.mozilla.org/en-US/docs/Web/API/CanvasRenderingContext2D/getImageData

  Drag-to-turn with momentum — the idea from three.js OrbitControls:
    https://threejs.org/docs/#examples/en/controls/OrbitControls

  The design — inside-wall drum read from above, the line-per-turn reading, the Stein text and colours — is inspired by zoetropes seen in Berlin museum of computers. 
-->
  
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>It Makes Sand — Roastbeef (Stein, Tender Buttons)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
  :root {
    --bg: #15110b;
    --dim: #8a8170;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    font-family: "Libre Caslon Text", "Caslon", Georgia, serif;
    color: #e9ddc2;
    -webkit-font-smoothing: antialiased;
    cursor: grab;
    touch-action: none;
  }
  body.dragging { cursor: grabbing; }

  #scene { position: fixed; inset: 0; display: block; }

  /* warm pool of light up where you read, dark at the edges */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
      radial-gradient(80% 50% at 50% 36%, rgba(255,240,205,0.10) 0%, rgba(0,0,0,0) 50%),
      radial-gradient(135% 125% at 50% 48%, rgba(0,0,0,0) 48%, rgba(7,4,2,0.9) 100%);
  }

  .titlebar {
    position: fixed;
    top: 20px;
    left: 0;
    right: 0;
    z-index: 3;
    text-align: center;
    pointer-events: none;
  }
  .titlebar .name {
    font-style: italic;
    font-size: 32px;
    letter-spacing: .01em;
    color: #d8caa6;
    opacity: .95;
  }
  .titlebar .attrib {
    margin-top: 7px;
    font-size: 14px;
    letter-spacing: .04em;
    color: var(--dim);
    opacity: .82;
  }
  .titlebar .attrib em { font-style: italic; }

  #controls {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 28px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #hint {
    font-style: italic;
    font-size: 16px;
    letter-spacing: .02em;
    color: var(--dim);
    opacity: .85;
    transition: opacity .8s ease;
  }
  #hint.gone { opacity: 0; }

  #dissolve {
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: .14em;
    text-transform: lowercase;
    color: #e9ddc2;
    background: rgba(20,14,9,.4);
    border: 1px solid rgba(207,157,99,.5);
    border-radius: 999px;
    padding: 11px 26px;
    backdrop-filter: blur(3px);
    transition: border-color .3s ease, color .3s ease, opacity .5s ease;
  }
  #dissolve:hover { border-color: rgba(228,135,173,.85); color: #fff; }
  #dissolve:focus-visible { outline: 2px solid #e9ddc2; outline-offset: 3px; }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--dim);
    font-style: italic;
    font-size: 18px;
    letter-spacing: .04em;
    transition: opacity .8s ease;
  }
  #loading.gone { opacity: 0; pointer-events: none; }

  @media (max-width: 560px) {
    .titlebar .name { font-size: 24px; }
    .titlebar .attrib { font-size: 11px; }
    #hint { font-size: 14px; }
    #dissolve { font-size: 14px; padding: 10px 20px; }
  }
</style>
</head>

<body>
  <canvas id="scene"></canvas>
  <div id="vignette"></div>

  <div class="titlebar">
    <div class="name">It Makes Sand</div>
    <div class="attrib">Gertrude Stein, &ldquo;Roastbeef,&rdquo; <em>Tender Buttons</em>, Claire Marie, 1914. p.&nbsp;33.</div>
  </div>

  <div id="controls">
    <div id="hint">it reads itself · drag sideways to turn · drag up &amp; down to tilt</div>
    <button id="dissolve">make it sand</button>
  </div>

  <div id="loading">setting the glass turning…</div>

<script>
/*
  It Makes Sand
  Stein's "Roastbeef" on a paper strip inside a little tin drum.
  One line travels all the way around, then the strip steps to the next.
  Drag to turn it, drag up/down to tilt, wheel to zoom; "make it sand"
  pours the whole strip onto the floor.

  Still a draft — fussing with the timing.
*/

// Flip to 1 if the lettering comes out backwards (we read the *inside*
// of the band, so the winding can go either way depending on the build).
const DIR = -1;

// Colour words keep their own colour; the little connective words go
// faint; everything else is plain ink.
const COL = {
  ink:    "#33271b",
  faint:  "#6f5d46",
  red:    "#9a3b2c",  // reddening
  gold:   "#9c7a1e",  // yellow
  burnt:  "#aa5a23",  // feeling
  navy:   "#23395d",  // evening
  forest: "#355e3b",  // anything
  sand:   "#8c6239"   // all / sand
};
const WORD_COLOUR = {
  reddening: COL.red,  yellow: COL.gold, feeling: COL.burnt,
  evening:   COL.navy, anything: COL.forest, all: COL.sand, sand: COL.sand
};
const QUIET = new Set(["in", "the", "there", "is", "and", "has", "have"]);

function colourFor(word) {
  const w = word.toLowerCase().replace(/[^a-z]/g, "");
  if (WORD_COLOUR[w]) return { colour: WORD_COLOUR[w], glow: true };
  if (QUIET.has(w))   return { colour: COL.faint, glow: false };
  return { colour: COL.ink, glow: false };
}

// The text. (Stein wrote "have"; an early transcription of mine said
// "nave" — this is the real one.)
const POEM = [
  "In the inside there is sleeping, in the outside there is reddening,",
  "in the morning there is meaning, in the evening there is feeling.",
  "In the evening there is feeling. In feeling anything is resting,",
  "in feeling anything is mounting, in feeling there is resignation,",
  "in feeling there is recognition, in feeling there is recurrence",
  "and entirely mistaken there is pinching. All the standards have steamers",
  "and all the curtains have bed linen and all the yellow has discrimination",
  "and all the circle has circling. This makes sand."
].join(" ");

// --- sizes ---
const R = 4.5, RT = 6.0, DRUM_H = 6.2;   // base radius, top radius (it flares), height
const FLOOR_Y = -DRUM_H / 2, TOP_Y = DRUM_H / 2;
const R_BAND = 5.0;                       // paper band, just inside the wall

const TURN = 3072;                        // pixels around one whole turn
const FS = 88, LINE_H = 138, VIS = 3;     // type size, line height, lines in view
const STRIP_H = VIS * LINE_H;

const BAND_MID = 0.7;
const BAND_H = 2 * Math.PI * R_BAND * (STRIP_H / TURN); // keeps the type un-stretched
const BAND_TOP = BAND_MID + BAND_H / 2;
const BAND_BOT = BAND_MID - BAND_H / 2;

// Break the poem into lines that each fill one turn, then paint them
// onto a tall "master" strip we scroll around.
function wrapToLines(ctx, maxW) {
  ctx.font = "400 " + FS + "px 'Libre Caslon Text','Caslon',Georgia,serif";
  const words = POEM.split(/\s+/);
  const lines = [[]];
  const space = ctx.measureText(" ").width;
  let run = 0;
  for (const word of words) {
    const ww = ctx.measureText(word).width;
    if (run + ww > maxW && lines[lines.length - 1].length) { lines.push([]); run = 0; }
    lines[lines.length - 1].push(word);
    run += ww + space;
  }
  return lines;
}

let master, masterH, lineCount;

// paint one word, hand back its width so the caller can advance
function paintWord(ctx, word, x, y) {
  const { colour, glow } = colourFor(word);
  ctx.fillStyle = colour;
  ctx.shadowColor = glow ? colour : "transparent";
  ctx.shadowBlur = glow ? 5 : 0;
  ctx.fillText(word, x, y);
  ctx.shadowBlur = 0;
  return ctx.measureText(word).width;
}

// stretch the spaces so the line fills the whole turn
function justifyLine(ctx, words, space, width, y) {
  const gaps = words.length - 1;
  if (gaps <= 0) { paintWord(ctx, words[0], 0, y); return; }
  let wordsW = 0;
  for (const wd of words) wordsW += ctx.measureText(wd).width;
  const gap = space + (width - (wordsW + gaps * space)) / gaps;
  let x = 0;
  for (const wd of words) x += paintWord(ctx, wd, x, y) + gap;
}

// the closing line gets spread letter by letter so it fills evenly
function spreadLine(ctx, words, width, y) {
  const cells = [];
  words.forEach(function (wd, wi) {
    const { colour, glow } = colourFor(wd);
    for (const ch of wd) cells.push({ ch: ch, colour: colour, glow: glow });
    if (wi < words.length - 1) cells.push({ ch: " ", colour: COL.ink, glow: false });
  });
  let natural = 0;
  for (const c of cells) natural += ctx.measureText(c.ch).width;
  const track = cells.length > 1 ? (width - natural) / (cells.length - 1) : 0;
  let x = 0;
  for (const c of cells) {
    ctx.fillStyle = c.colour;
    ctx.shadowColor = c.glow ? c.colour : "transparent";
    ctx.shadowBlur = c.glow ? 5 : 0;
    ctx.fillText(c.ch, x, y);
    x += ctx.measureText(c.ch).width + track;
  }
  ctx.shadowBlur = 0;
}

function buildMaster() {
  const probe = document.createElement("canvas").getContext("2d");
  probe.font = "400 " + FS + "px 'Libre Caslon Text','Caslon',Georgia,serif";
  const space = probe.measureText(" ").width;
  const width = TURN - space;   // fill the turn edge to edge, one space left at the seam

  const lines = wrapToLines(probe, width);
  lineCount = lines.length;
  masterH = lineCount * LINE_H;

  master = document.createElement("canvas");
  master.width = TURN;
  master.height = masterH;
  const ctx = master.getContext("2d");

  const paper = ctx.createLinearGradient(0, 0, 0, masterH);
  paper.addColorStop(0, "#efe5cd");
  paper.addColorStop(1, "#e6d8ba");
  ctx.fillStyle = paper;
  ctx.fillRect(0, 0, TURN, masterH);

  ctx.font = "400 " + FS + "px 'Libre Caslon Text','Caslon',Georgia,serif";
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";

  for (let i = 0; i < lineCount; i++) {
    const y = i * LINE_H + LINE_H / 2;

    // faint rule under each line
    ctx.strokeStyle = "rgba(120,98,64,0.10)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, i * LINE_H);
    ctx.lineTo(TURN, i * LINE_H);
    ctx.stroke();

    if (i === lineCount - 1) spreadLine(ctx, lines[i], width, y);
    else                     justifyLine(ctx, lines[i], space, width, y);
  }
}

// --- the visible strip: composite the scrolling window each frame ---
const bandCanvas = document.createElement("canvas");
bandCanvas.width = TURN;
bandCanvas.height = STRIP_H;
const bctx = bandCanvas.getContext("2d");

let scrollX = 0, scrollY = 0, scrollYTo = 0, nextStep = TURN;

function paintStrip() {
  const ox = ((scrollX % TURN) + TURN) % TURN;
  const oy = ((scrollY % masterH) + masterH) % masterH;

  bctx.clearRect(0, 0, TURN, STRIP_H);
  for (let dx = -ox; dx < TURN; dx += TURN) {
    for (let dy = -oy; dy < STRIP_H; dy += masterH) bctx.drawImage(master, dx, dy);
    bctx.drawImage(master, dx, -oy - masterH);  // the wrap copy above
  }

  // a soft glow on the centre line so the eye knows where to land
  const mid = STRIP_H / 2;
  const glow = bctx.createLinearGradient(0, mid - LINE_H * 0.62, 0, mid + LINE_H * 0.62);
  glow.addColorStop(0,   "rgba(255,236,200,0)");
  glow.addColorStop(0.5, "rgba(255,236,200,0.16)");
  glow.addColorStop(1,   "rgba(255,236,200,0)");
  bctx.fillStyle = glow;
  bctx.fillRect(0, mid - LINE_H * 0.62, TURN, LINE_H * 1.24);

  bandTex.needsUpdate = true;
}

// Band built by hand so I know exactly where each pixel lands in 3D
// (the dissolve reuses the same mapping in bandSpot).
function buildBand() {
  const segs = 200;
  const pos = [], uv = [], idx = [];
  for (let j = 0; j <= segs; j++) {
    const u = j / segs, th = DIR * u * Math.PI * 2;
    const x = Math.sin(th) * R_BAND, z = Math.cos(th) * R_BAND;
    pos.push(x, BAND_BOT, z); uv.push(u, 0);
    pos.push(x, BAND_TOP, z); uv.push(u, 1);
  }
  for (let j = 0; j < segs; j++) {
    const a = j * 2, b = a + 1, c = a + 2, d = a + 3;
    idx.push(a, b, c, b, d, c);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute("uv", new THREE.Float32BufferAttribute(uv, 2));
  g.setIndex(idx);
  return g;
}

function bandSpot(px, py, out) {
  const u = px / TURN, th = DIR * u * Math.PI * 2;
  const v = 1 - py / STRIP_H;
  out.set(Math.sin(th) * R_BAND, BAND_BOT + v * (BAND_TOP - BAND_BOT), Math.cos(th) * R_BAND);
  return out;
}

// scuffed tin wall with the slit marks
function metalTexture() {
  const w = 2048, h = 512;
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const g = c.getContext("2d");

  const grad = g.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, "#5a4a34");
  grad.addColorStop(0.5, "#33271a");
  grad.addColorStop(1, "#1a130c");
  g.fillStyle = grad;
  g.fillRect(0, 0, w, h);

  for (let i = 0; i < 240; i++) {
    g.fillStyle = "rgba(20,12,6," + (0.05 + Math.random() * 0.18) + ")";
    const r = 2 + Math.random() * 9;
    g.beginPath();
    g.arc(Math.random() * w, Math.random() * h, r, 0, Math.PI * 2);
    g.fill();
  }
  for (let i = 0; i < 16; i++) {
    const x = (i + 0.5) / 16 * w;
    const slit = g.createLinearGradient(x - 3, 0, x + 3, 0);
    slit.addColorStop(0, "rgba(255,248,230,0)");
    slit.addColorStop(0.5, "rgba(255,248,230,0.85)");
    slit.addColorStop(1, "rgba(255,248,230,0)");
    g.fillStyle = slit;
    g.fillRect(x - 3, h * 0.12, 6, h * 0.6);
  }

  const t = new THREE.CanvasTexture(c);
  t.needsUpdate = true;
  return t;
}

// --- scene ---
const canvas = document.getElementById("scene");
const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);

// dark warm backdrop
(function () {
  const c = document.createElement("canvas");
  c.width = 16; c.height = 256;
  const g = c.getContext("2d");
  const grad = g.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, "#241a11");
  grad.addColorStop(1, "#0c0805");
  g.fillStyle = grad;
  g.fillRect(0, 0, 16, 256);
  scene.background = new THREE.CanvasTexture(c);
})();

const drum = new THREE.Mesh(
  new THREE.CylinderGeometry(RT, R, DRUM_H, 140, 1, true),
  new THREE.MeshBasicMaterial({ map: metalTexture(), side: THREE.DoubleSide })
);
scene.add(drum);

const floor = new THREE.Mesh(
  new THREE.CircleGeometry(R * 0.99, 90),
  new THREE.MeshBasicMaterial({ color: 0x2a2014 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = FLOOR_Y;
scene.add(floor);

function addRim(y, r) {
  const m = new THREE.Mesh(
    new THREE.TorusGeometry(r, 0.05, 10, 140),
    new THREE.MeshBasicMaterial({ color: 0x4a3a26 })
  );
  m.rotation.x = Math.PI / 2;
  m.position.y = y;
  scene.add(m);
}
addRim(TOP_Y, RT);
addRim(FLOOR_Y, R);

buildMaster();
const bandTex = new THREE.CanvasTexture(bandCanvas);
bandTex.minFilter = THREE.LinearFilter;
bandTex.magFilter = THREE.LinearFilter;
bandTex.generateMipmaps = false;

const band = new THREE.Mesh(
  buildBand(),
  new THREE.MeshBasicMaterial({ map: bandTex, side: THREE.DoubleSide, depthWrite: true })
);
band.renderOrder = 1;
scene.add(band);

// --- camera: turn the strip, drag up/down to tilt, wheel to zoom ---
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
let pitch = 0.62, dist = 17.5;
const TARGET = new THREE.Vector3(0, 0.7, 0);

function placeCamera() {
  pitch = Math.max(0.18, Math.min(1.30, pitch));
  dist = Math.max(12, Math.min(24, dist));
  camera.position.set(0, TARGET.y + Math.sin(pitch) * dist, Math.cos(pitch) * dist);
  camera.lookAt(TARGET);
}

const drift = reduceMotion ? 0 : TURN / 15;   // a slow turn on its own, ~15s per lap
let flick = 0;                                 // momentum after a drag
let dragging = false, lastX = 0, lastY = 0, lastT = 0;

function onDown(e) {
  dragging = true;
  document.body.classList.add("dragging");
  lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
  flick = 0;
  hint.classList.add("gone");
  if (canvas.setPointerCapture) canvas.setPointerCapture(e.pointerId);
}

function onMove(e) {
  if (!dragging) return;
  const now = performance.now();
  const dt = Math.max(1, now - lastT);
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  scrollX += dx * 4.0;
  flick = (dx * 4.0) / (dt / 1000);
  pitch += dy * 0.004;
  placeCamera();

  lastX = e.clientX; lastY = e.clientY; lastT = now;
}

function onUp() {
  if (!dragging) return;
  dragging = false;
  document.body.classList.remove("dragging");
  flick = Math.max(-TURN * 1.5, Math.min(TURN * 1.5, flick));
}

canvas.addEventListener("pointerdown", onDown);
window.addEventListener("pointermove", onMove);
window.addEventListener("pointerup", onUp);
window.addEventListener("pointercancel", onUp);
canvas.addEventListener("wheel", function (e) {
  e.preventDefault();
  dist += e.deltaY * 0.012;
  placeCamera();
}, { passive: false });

// --- "make it sand": tip the whole strip onto the floor ---
let grains = null, grainData = null, dissolving = false, sandT = 0;

const GRAIN = (function () {
  const c = document.createElement("canvas");
  c.width = c.height = 64;
  const g = c.getContext("2d");
  const dot = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  dot.addColorStop(0, "rgba(255,255,255,1)");
  dot.addColorStop(0.4, "rgba(255,255,255,0.8)");
  dot.addColorStop(1, "rgba(255,255,255,0)");
  g.fillStyle = dot;
  g.beginPath();
  g.arc(32, 32, 32, 0, Math.PI * 2);
  g.fill();
  const t = new THREE.CanvasTexture(c);
  t.needsUpdate = true;
  return t;
})();

function makeSand() {
  const step = window.innerWidth < 560 ? 14 : 9;
  const img = bctx.getImageData(0, 0, TURN, STRIP_H).data;
  const pos = [], col = [], vel = [], delay = [];
  const p = new THREE.Vector3();

  for (let py = 0; py < STRIP_H; py += step) {
    for (let px = 0; px < TURN; px += step) {
      const k = (py * TURN + px) * 4;
      if (img[k + 3] < 40) continue;

      bandSpot(px, py, p);
      pos.push(p.x, p.y, p.z);
      col.push(img[k] / 255, img[k + 1] / 255, img[k + 2] / 255);
      vel.push((Math.random() - 0.5) * 0.3, (Math.random() - 0.1) * 0.2, (Math.random() - 0.5) * 0.3);
      // top of the strip lets go first, like an hourglass emptying
      delay.push(0.5 - (p.y / (BAND_TOP - BAND_BOT)) * 0.3 + Math.random() * 0.55);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute("color", new THREE.Float32BufferAttribute(col, 3));
  grains = new THREE.Points(geo, new THREE.PointsMaterial({
    size: 0.06, map: GRAIN, vertexColors: true,
    transparent: true, opacity: 1, depthWrite: false,
    sizeAttenuation: true, blending: THREE.NormalBlending
  }));
  grains.renderOrder = 4;
  scene.add(grains);

  grainData = { vel: vel, delay: delay, count: delay.length };
  band.visible = false;
}

function startSand() {
  if (dissolving || grains) return;
  makeSand();
  dissolving = true;
  sandT = 0;
  flick = 0;
  dissolveBtn.textContent = "again";
}

function reform() {
  if (grains) {
    scene.remove(grains);
    grains.geometry.dispose();
    grains.material.dispose();
    grains = null;
    grainData = null;
  }
  dissolving = false;
  band.visible = true;
  dissolveBtn.textContent = "make it sand";
}

function fallSand(dt) {
  sandT += dt;
  const a = grains.geometry.attributes.position.array;
  const { vel, delay, count } = grainData;
  const g = 4.0;
  const rest = FLOOR_Y + 0.02;

  for (let i = 0; i < count; i++) {
    if (sandT < delay[i]) continue;
    const j = i * 3;
    vel[j + 1] -= g * dt;
    vel[j]     += (Math.random() - 0.5) * 0.18 * dt;
    vel[j + 2] += (Math.random() - 0.5) * 0.18 * dt;
    a[j]     += vel[j]     * dt;
    a[j + 1] += vel[j + 1] * dt;
    a[j + 2] += vel[j + 2] * dt;

    if (a[j + 1] <= rest) {                 // land and settle on the floor
      a[j + 1] = rest + Math.random() * 0.05;
      vel[j + 1] = 0;
      vel[j]     *= 0.55;
      vel[j + 2] *= 0.55;
      const r = Math.hypot(a[j], a[j + 2]);  // keep the heap inside the wall
      if (r > R * 0.97) { a[j] *= R * 0.97 / r; a[j + 2] *= R * 0.97 / r; }
    }
  }

  grains.geometry.attributes.position.needsUpdate = true;
  grains.material.opacity = Math.max(0, 1 - Math.max(0, sandT - 3.0) / 3.6);
}

// --- main loop ---
const clock = new THREE.Clock();

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(0.05, clock.getDelta());

  if (!dissolving) {
    if (!dragging) {
      scrollX += (drift + flick) * dt;
      flick *= Math.pow(0.1, dt);
      if (Math.abs(flick) < 1) flick = 0;
    }
    // once a line has gone all the way round, step up to the next
    while (scrollX >= nextStep) { scrollYTo += LINE_H; nextStep += TURN; }
    scrollY += (scrollYTo - scrollY) * Math.min(1, dt * 4.5);
    paintStrip();
  } else if (grains) {
    fallSand(dt);
  }

  renderer.render(scene, camera);
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);

// --- wire up + start ---
const hint = document.getElementById("hint");
const dissolveBtn = document.getElementById("dissolve");
dissolveBtn.addEventListener("click", function () {
  (grains || dissolving) ? reform() : startSand();
});

function start() {
  placeCamera();
  resize();
  paintStrip();
  tick();
  document.getElementById("loading").classList.add("gone");
  setTimeout(function () { if (!reduceMotion) hint.classList.remove("gone"); }, 400);
  setTimeout(function () { hint.classList.add("gone"); }, 9000);
}

// wait for Caslon so the strip isn't baked in a fallback face
const ready = (document.fonts && document.fonts.load)
  ? Promise.race([
      document.fonts.load("400 80px 'Libre Caslon Text'").then(function () { return document.fonts.ready; }),
      new Promise(function (r) { setTimeout(r, 2500); })
    ])
  : Promise.resolve();

ready.then(function () { buildMaster(); start(); }).catch(start);
</script>
</body>
